version: '3.8'

services:
  mongo:
    image: mongo:6
    container_name: ems_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'
    networks:
      - ems_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ems_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/employee_management
      - PORT=5000
    ports:
      - '5000:5000'
    depends_on:
      - mongo
    volumes:
      - uploads_data:/app/uploads
      - backups_data:/app/backups
    networks:
      - ems_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ems_frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - backend
    networks:
      - ems_network

volumes:
  mongo_data:
  uploads_data:
  backups_data:

networks:
  ems_network:
    driver: bridge
